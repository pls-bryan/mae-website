name: Redeploy From Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  trigger-redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "DEPLOY_HOOK_URL secret is not set. Skipping."
            exit 0
          fi

          curl -X POST -fsS "$DEPLOY_HOOK_URL"
